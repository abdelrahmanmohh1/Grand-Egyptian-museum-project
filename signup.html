<!DOCTYPE html>
<html>
<head>
<title> Sign Up</title>
<link rel="stylesheet" href="style-login.css">
</head>
<body class="signup-page">
<form  onsubmit="goToHome(event)" id="signupForm">
<h1> Sign Up </h1>
<h5>Full Name </h5>
<input type="text" placeholder="Enter Your Name" required><br><br>
<h5>Email</h5>
<input type="email" placeholder="Enter Your Email" required><br><br>
<h5>Password</h5>
<input type="password" placeholder="Enter Your Password"required><br><br>
<h5>Confirm Password</h5>
<input type="password" placeholder="Re-Enter Your Password" required><br><br>
<button class ="signup-btn" type="submit">Create Account</button>

<p> Already have an account ? <a href="login.html">Login</a></p>
</form>
<script src="signup.script.js"></script>

</body>
</html>
